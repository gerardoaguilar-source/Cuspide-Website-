<!DOCTYPE html>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f9fafb; font-family: system-ui, sans-serif; }
.top-bar {
  background: #fff;
  border-bottom: 1px solid #d1d5db;
  padding: 10px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.back-btn {
  background: #1a2a6c;
  color: #fff;
  border: none;
  padding: 8px 20px;
  border-radius: 7px;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
}
.back-btn:hover { background: #2541b2; }
.title {
  font-size: 1.1rem;
  font-weight: 700;
  color: #1a2a6c;
}
.img-wrap {
  max-width: 950px;
  margin: 32px auto;
  padding: 0 16px;
}
.img-wrap img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 10px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.13);
}

/* ── CONTACT & MAP ── */
.contact-section {
  background: linear-gradient(135deg, #f5c518, #e6a817);
  text-align: center;
  padding: 80px 40px;
  color: #1f2937;
}
.contact-title {
  font-family: var(--font-display);
  font-size: 2.6rem;
  font-weight: 800;
  font-style: italic;
  color: #1a2a6c;
  margin-bottom: 16px;
}
.contact-divider {
  width: 60px;
  height: 4px;
  background: #1a2a6c;
  border-radius: 2px;
  margin: 0 auto 40px;
}
.contact-label {
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: #1a2a6c;
  margin-bottom: 12px;
}
.contact-text {
  font-size: 1.15rem;
  color: #1f2937;
  line-height: 1.7;
  margin-bottom: 36px;
  opacity: 0.85;
}
.contact-phone {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 700;
  color: #1a2a6c;
  letter-spacing: 0.02em;
}
.ubicacion-section {
  background: #f9fafb;
  padding: 80px 40px 60px;
  text-align: center;
}
.section-tag {
  display: inline-block;
  background: #1a2a6c;
  color: #f5c518;
  font-weight: 700;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 16px;
  border-radius: 20px;
  margin-bottom: 14px;
}
.section-title {
  font-family: var(--font-display);
  font-size: clamp(1.8rem, 4vw, 2.6rem);
  color: #1a2a6c;
  margin-bottom: 10px;
}
.section-divider {
  width: 60px;
  height: 4px;
  background: #f5c518;
  border-radius: 2px;
  margin: 0 auto;
}
.center { text-align: center; }
.map-wrapper {
  max-width: 1100px;
  margin: 0 auto;
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.1);
  border: 1px solid #e5e7eb;
}
.map-wrapper iframe { width: 100%; height: 300px; display: block; }

<body>
<div class="top-bar">
